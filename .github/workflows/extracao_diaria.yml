name: Extração Diária Órulo

on:
  schedule:
    - cron: "0 9 * * *"   # 06:00 BRT (UTC-3)
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

jobs:
  extrair:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Executar extração
        env:
          ORULO_CLIENT_ID: ${{ secrets.ORULO_CLIENT_ID }}
          ORULO_CLIENT_SECRET: ${{ secrets.ORULO_CLIENT_SECRET }}
        run: python orulo_extracao.py

      - name: Commit e push do CSV atualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/orulo_empreendimentos.csv
          git diff --cached --quiet || git commit -m "Atualização automática $(date '+%Y-%m-%d')"
          git push
